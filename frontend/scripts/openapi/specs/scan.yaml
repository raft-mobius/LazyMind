                dataset_id:
                    type: string
                default_origin_platform:
                    type: string
                default_origin_type:
                    type: string
                default_trigger_policy:
                    type: string
                idle_window_seconds:
                    format: int64
                    type: integer
                name:
                    type: string
                reconcile_schedule:
                    type: string
                reconcile_seconds:
                    format: int64
                    type: integer
                root_path:
                    type: string
            type: object
        UpsertCloudSourceBindingRequest:
            properties:
                auth_connection_id:
                    type: string
                enabled:
                    type: boolean
                exclude_patterns:
                    items:
                        type: string
                    type: array
                include_patterns:
                    items:
                        type: string
                    type: array
                max_object_size_bytes:
                    format: int64
                    type: integer
                provider:
                    type: string
                provider_options:
                    additionalProperties: true
                    type: object
                reconcile_after_sync:
                    type: boolean
                reconcile_delay_minutes:
                    format: int64
                    type: integer
                schedule_expr:
                    type: string
                schedule_tz:
                    type: string
                target_ref:
                    type: string
                target_type:
                    type: string
            required:
                - provider
                - auth_connection_id
            type: object
        ValidateCloudTargetRequest:
            properties:
                auth_connection_id:
                    type: string
                provider:
                    type: string
                provider_options:
                    additionalProperties: true
                    type: object
                target_ref:
                    type: string
                target_type:
                    type: string
            required:
                - provider
                - auth_connection_id
            type: object
        ValidateCloudTargetResponse:
            properties:
                valid:
                    type: boolean
            required:
                - valid
            type: object
        WatchToggleResponse:
            properties:
                accepted:
                    type: boolean
                baseline_snapshot_queued:
                    type: boolean
                skip_initial_scan:
                    type: boolean
            required:
                - accepted
            type: object

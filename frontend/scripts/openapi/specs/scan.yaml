components:
    schemas:
        AckCommandRequest:
            properties:
                agent_id:
                    type: string
                command_id:
                    format: int64
                    type: integer
                error:
                    type: string
                result_json:
                    type: string
                success:
                    type: boolean
            required:
                - agent_id
                - command_id
                - success
            type: object
        Agent:
            properties:
                active_source_count:
                    format: int64
                    type: integer
                active_task_count:
                    format: int64
                    type: integer
                active_watch_count:
                    format: int64
                    type: integer
                agent_id:
                    type: string
                hostname:
                    type: string
                last_heartbeat_at:
                    format: date-time
                    type: string
                listen_addr:
                    type: string
                status:
                    type: string
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
                version:
                    type: string
            required:
                - agent_id
                - tenant_id
                - status
                - listen_addr
            type: object
        AgentPathRequest:
            properties:
                agent_id:
                    type: string
                path:
                    type: string
            required:
                - agent_id
                - path
            type: object
        AgentPathTreeRequest:
            properties:
                agent_id:
                    type: string
                changes_only:
                    type: boolean
                include_files:
                    type: boolean
                keyword:
                    type: string
                max_depth:
                    format: int64
                    type: integer
                path:
                    type: string
                source_id:
                    type: string
                updated_only:
                    type: boolean
            required:
                - agent_id
                - path
            type: object
        AgentPathTreeResponse:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/TreeNode'
                    type: array
                selection_token:
                    type: string
            required:
                - items
            type: object
        AgentPathValidateResponse:
            properties:
                allowed:
                    type: boolean
                exists:
                    type: boolean
                is_dir:
                    type: boolean
                path:
                    type: string
                readable:
                    type: boolean
                reason:
                    type: string
            required:
                - path
                - exists
                - readable
                - is_dir
                - allowed
            type: object
        CloudSourceBinding:
            properties:
                auth_connection_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                enabled:
                    type: boolean
                exclude_patterns:
                    items:
                        type: string
                    type: array
                include_patterns:
                    items:
                        type: string
                    type: array
                last_error:
                    type: string
                max_object_size_bytes:
                    format: int64
                    type: integer
                next_sync_at:
                    format: date-time
                    type: string
                provider:
                    type: string
                provider_options:
                    additionalProperties: true
                    type: object
                reconcile_after_sync:
                    type: boolean
                reconcile_delay_minutes:
                    format: int64
                    type: integer
                schedule_expr:
                    type: string
                schedule_tz:
                    type: string
                source_id:
                    type: string
                status:
                    type: string
                target_ref:
                    type: string
                target_type:
                    type: string
                tenant_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            required:
                - source_id
                - tenant_id
                - provider
                - enabled
                - status
                - auth_connection_id
                - schedule_expr
                - schedule_tz
                - created_at
                - updated_at
            type: object
        CloudSyncRun:
            properties:
                created_count:
                    format: int64
                    type: integer
                deleted_count:
                    format: int64
                    type: integer
                error_code:
                    type: string
                error_message:
                    type: string
                failed_count:
                    format: int64
                    type: integer
                finished_at:
                    format: date-time
                    type: string
                provider:
                    type: string
                remote_total:
                    format: int64
                    type: integer
                requested_paths:
                    items:
                        type: string
                    type: array
                run_id:
                    type: string
                skipped_count:
                    format: int64
                    type: integer
                source_id:
                    type: string
                started_at:
                    format: date-time
                    type: string
                status:
                    type: string
                tenant_id:
                    type: string
                trigger_type:
                    type: string
                updated_count:
                    format: int64
                    type: integer
            required:
                - run_id
                - source_id
                - tenant_id
                - provider
                - trigger_type
                - status
            type: object

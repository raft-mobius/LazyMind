            properties:
                algo:
                    properties:
                        algo_id:
                            type: string
                        description:
                            type: string
                        display_name:
                            type: string
                    required:
                        - algo_id
                    type: object
                name:
                    type: string
            required:
                - name
                - algo
            type: object
        CreateKnowledgeBaseResponse:
            properties:
                dataset_id:
                    type: string
                name:
                    type: string
            required:
                - dataset_id
                - name
            type: object
        CreateSourceRequest:
            properties:
                agent_id:
                    type: string
                create_user_id:
                    type: string
                dataset_id:
                    type: string
                default_origin_platform:
                    type: string
                default_origin_type:
                    type: string
                default_trigger_policy:
                    type: string
                idle_window_seconds:
                    format: int64
                    type: integer
                name:
                    type: string
                reconcile_schedule:
                    type: string
                reconcile_seconds:
                    format: int64
                    type: integer
                root_path:
                    type: string
                tenant_id:
                    type: string
                watch_enabled:
                    type: boolean
            required:
                - tenant_id
                - name
                - agent_id
            type: object
        DeleteSourceResponse:
            properties:

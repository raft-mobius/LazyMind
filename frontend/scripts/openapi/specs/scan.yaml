                    type: string
                message:
                    type: string
            required:
                - code
                - message
            type: object
        ExpediteTasksRequest:
            properties:
                paths:
                    items:
                        type: string
                    type: array
            required:
                - paths
            type: object
        ExpediteTasksResponse:
            properties:
                created_task_count:

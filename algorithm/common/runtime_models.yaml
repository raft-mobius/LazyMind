# Runtime model roles for LazyMind (online/cloud deployment).
# Chat/rerank roles use source=dynamic: model config is injected per-request via globals.config.
# Embedding roles stay static so lazyllm-algo can initialize vector-store schema at startup.

llm:
  source: dynamic
  dynamic_auth: true
  type: llm

evo_llm:
  source: dynamic
  dynamic_auth: true
  type: llm

reranker:
  source: dynamic
  dynamic_auth: true
  type: rerank

embed_main:
  - source: qwen
    type: embed
    name: text-embedding-v3

# Cross-modal (image) embed; used by image nodes and image-only retrieval branch.
embed_image:
  - source: qwen
    type: cross_modal_embed
    name: qwen2.5-vl-embedding

vlm:
  source: dynamic
  dynamic_auth: true
  type: vlm
